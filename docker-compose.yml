services:
  traefik:
    image: "traefik:v3.6.12"
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.address=:80
      - --log.level=WARN
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --providers.docker=true
      - --ping=true
      - --certificatesresolvers.leresolver.acme.email=kuznetsov.daniil.d2@gmail.com
      - --certificatesresolvers.leresolver.acme.storage=/etc/traefik/acme.json
      - --certificatesresolvers.leresolver.acme.dnschallenge=true
      - --certificatesresolvers.leresolver.acme.dnschallenge.provider=exec
    labels:
      - 'traefik.http.routers.wildcard-certs.tls.certresolver=leresolver'
      - 'traefik.http.routers.wildcard-certs.tls.domains[0].main=${DOMAIN}'
      - 'traefik.http.routers.wildcard-certs.tls.domains[0].sans=*.${DOMAIN}'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - $PWD/volumes/traefik/:/etc/traefik/
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - 'REGRU_USERNAME=${REGRU_USERNAME}'
      - 'REGRU_PASSWORD=${REGRU_PASSWORD}'
      - 'REGRU_PROPAGATION_TIMEOUT=300'
      - 'REGRU_POLLING_INTERVAL=60'
      - 'EXEC_PATH=/etc/traefik/update-dns.sh'
      - 'EXEC_POLLING_INTERVAL=60'
      - 'EXEC_PROPAGATION_TIMEOUT=660'
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.28.3
    restart: unless-stopped
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      hugo:
        condition: service_healthy
    volumes:
      - $PWD/volumes/nginx/html/:/usr/share/nginx/html/
      - $PWD/volumes/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blog.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.blog.tls.certresolver=leresolver"
      - "traefik.http.routers.blog.entrypoints=websecure"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  hugo:
    image: hugo
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - traefik
    volumes:
      - $PWD/volumes/nginx/html/:/usr/share/nginx/html/
    environment:
      - HUGO_REPO_URL=${HUGO_REPO_URL}
      - NGINX_HTML_VOLUME=/usr/share/nginx/html/
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    labels:
      - "traefik.http.routers.hugo.rule=Host(`${DOMAIN}`) && PathPrefix(`/hooks`)"
      - "traefik.http.routers.hugo.tls.certresolver=leresolver"
      - "traefik.http.routers.hugo.entrypoints=websecure"
      - "traefik.http.services.hugo.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
